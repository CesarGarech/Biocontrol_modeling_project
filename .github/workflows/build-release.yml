name: Build & Release Windows Installer

on:
  push:
    tags:
      - "v*"   # Triggered by version tags such as v1.0.0, v1.1.0

permissions:
  contents: write  # Required to create GitHub releases and upload assets

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Download Python 3.10.9 installer into dependencies/
      # -----------------------------------------------------------------------
      - name: Download Python 3.10.9 installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dependencies | Out-Null
          $url = "https://www.python.org/ftp/python/3.10.9/python-3.10.9-amd64.exe"
          $dest = "dependencies\python-3.10.9-amd64.exe"
          Write-Host "Downloading $url ..."
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Write-Host "Downloaded: $(Get-Item $dest | Select-Object -ExpandProperty Length) bytes"

      # -----------------------------------------------------------------------
      # 3. Download DWSIM from the official DanWBR/DWSIM GitHub releases
      #    and extract into dependencies/DWSIM/
      # -----------------------------------------------------------------------
      - name: Download DWSIM release
        shell: pwsh
        run: |
          # Fetch the latest DWSIM release metadata
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/DanWBR/dwsim/releases/latest" `
            -Headers @{ "Accept" = "application/vnd.github+json" }

          # Find the Windows installer asset
          $asset = $release.assets | Where-Object {
            $_.name -like "*windows*" -or $_.name -like "*setup*" -or $_.name -like "*.exe"
          } | Select-Object -First 1

          if ($null -eq $asset) {
            Write-Error "No Windows installer asset found in DWSIM latest release."
            exit 1
          }

          $dwsimInstaller = "dependencies\dwsim_setup.exe"
          Write-Host "Downloading DWSIM: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url `
                            -OutFile $dwsimInstaller `
                            -UseBasicParsing

          # Install DWSIM silently into dependencies\DWSIM
          Write-Host "Installing DWSIM silently..."
          $dwsimDest = "$env:GITHUB_WORKSPACE\dependencies\DWSIM"
          Start-Process -FilePath $dwsimInstaller `
                        -ArgumentList "/SILENT", "/DIR=$dwsimDest" `
                        -Wait -NoNewWindow
          Write-Host "DWSIM files at: $dwsimDest"
          Get-ChildItem $dwsimDest | Select-Object Name | Format-Table -AutoSize

      # -----------------------------------------------------------------------
      # 4. Compile the Inno Setup script
      # -----------------------------------------------------------------------
      - name: Set version number (strip leading 'v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/biocontrol_setup.iss
          options: /DAppVersion=${{ env.APP_VERSION }}

      # -----------------------------------------------------------------------
      # 5. Create a GitHub Release and attach the installer .exe
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/BiocontrolDashboard-Setup-v*.exe
          draft: false
          prerelease: false
          body: |
            ## 📦 Biocontrol Dashboard ${{ github.ref_name }}

            ### 🇪🇸 Instalación (Español)

            1. Descargue el archivo `BiocontrolDashboard-Setup-vX.X.X.exe` de la sección **Assets**.
            2. Ejecute el instalador con doble clic.
            3. Siga los pasos del asistente. El instalador configurará automáticamente:
               - Python 3.10.9
               - DWSIM (simulador de procesos)
               - Todas las librerías Python necesarias
            4. Al finalizar, abra "Biocontrol Dashboard" desde el menú de inicio o el escritorio.

            ---

            ### 🇬🇧 Installation (English)

            1. Download `BiocontrolDashboard-Setup-vX.X.X.exe` from the **Assets** section below.
            2. Run the installer by double-clicking it.
            3. Follow the wizard steps. The installer will automatically set up:
               - Python 3.10.9
               - DWSIM process simulator
               - All required Python libraries
            4. Once complete, open "Biocontrol Dashboard" from the Start Menu or Desktop.

            ---

            ### ⚙️ System Requirements

            | Requirement | Minimum |
            |-------------|---------|
            | OS | Windows 10 (64-bit, build 17763+) |
            | RAM | 4 GB (8 GB recommended) |
            | Disk | 3 GB free space |
            | Internet | Required during installation (pip packages) |

            ---

            See [CHANGELOG.md](https://github.com/CesarGarech/Biocontrol_modeling_project/blob/main/CHANGELOG.md) for a full list of changes.
