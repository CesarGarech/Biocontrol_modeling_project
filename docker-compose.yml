version: '3.8'

services:
  biocontrol_app:
    build: .
    container_name: Process_Simulator
    ports:
      - "8501:8501"
    volumes:
      - ./Output:/app/Output
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
      - STREAMLIT_SERVER_HEADLESS=true
      - DWSIM_INSTALL_PATH=/usr/lib/dwsim
      - USE_DWSIM_LIVE=true
      # Eliminamos STREAMLIT_SERVER_FILE_WATCHER_TYPE=none para recuperar el hot-reload